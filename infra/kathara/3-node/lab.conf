LAB_NAME="netos-demo-3node"
LAB_DESCRIPTION="NetOS 3-node linear topology demo (Kathara)"
LAB_VERSION="1.0"

# Linear topology: node1 <-> node2 <-> node3
node1[0]="link12"
node2[0]="link12"
node2[1]="link23"
node3[0]="link23"

# Use NetOS demo image from this repo
node1[image]="netos-demo:latest"
node2[image]="netos-demo:latest"
node3[image]="netos-demo:latest"

# Cap resources a bit
node1[mem]="256m"
node2[mem]="256m"
node3[mem]="256m"
